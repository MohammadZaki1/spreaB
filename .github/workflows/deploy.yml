name: Auto Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ECR_REGION: ap-south-1
      ECR_ACCOUNT_ID: your-account-id
      EC2_USER: ec2-user
      EC2_HOST: your.ec2.public.ip

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # ------------------------
      # BACKEND (Docker + ECR)
      # ------------------------
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $ECR_REGION | docker login --username AWS --password-stdin $ECR_ACCOUNT_ID.dkr.ecr.$ECR_REGION.amazonaws.com

      - name: Build & Push Backend Docker Image
        run: |
          docker build -t backend ./spreadb_project-main
          docker tag backend:latest $ECR_ACCOUNT_ID.dkr.ecr.$ECR_REGION.amazonaws.com/backend:latest
          docker push $ECR_ACCOUNT_ID.dkr.ecr.$ECR_REGION.amazonaws.com/backend:latest

      # ------------------------
      # FRONTEND BUILD
      # ------------------------
      - name: Build Frontend
        run: |
          cd spreadb_frontend-main
          npm install
          npm run build

      # ------------------------
      # COPY FRONTEND BUILD → EC2
      # ------------------------
      - name: Upload frontend files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "spreadb_frontend-main/build/*"
          target: "/home/ec2-user/frontend-temp/"

      # ------------------------
      # RESTART BACKEND + MOVE FRONTEND FILES
      # ------------------------
      - name: Connect & Deploy on EC2
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ env.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Backend Deploy ==="

            docker pull $ECR_ACCOUNT_ID.dkr.ecr.$ECR_REGION.amazonaws.com/backend:latest

            docker stop backend || true
            docker rm backend || true

            docker run -d --name backend -p 3001:3001 \
              -e NODE_ENV=production \
              $ECR_ACCOUNT_ID.dkr.ecr.$ECR_REGION.amazonaws.com/backend:latest

            echo "=== Frontend Deploy ==="

            sudo rm -rf /usr/share/nginx/html/*
            sudo cp -r /home/ec2-user/frontend-temp/* /usr/share/nginx/html/

            sudo systemctl restart nginx

            echo "Deployment Completed!"
