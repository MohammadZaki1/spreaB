name: Auto Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      EC2_USER: ec2-user
      EC2_HOST: your.ec2.public.ip

    steps:
      # ------------------------
      # 1️⃣ Checkout Code
      # ------------------------
      - name: Checkout code
        uses: actions/checkout@v3

      # ------------------------
      # 2️⃣ Configure AWS credentials
      # ------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      # ------------------------
      # 3️⃣ Login to Amazon Public ECR
      # ------------------------
      - name: Login to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin public.ecr.aws/v8a6y7y7

      # ------------------------
      # 4️⃣ Build & Push Backend Docker Image
      # ------------
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "spreadb_frontend-main/build/*"
          target: "/home/ec2-user/frontend-temp/"

      # ------------------------
      # 7️⃣ Deploy Backend & Frontend on EC2
      # ------------------------
      - name: Connect & Deploy on EC2
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ env.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Backend Deploy ==="

            docker pull public.ecr.aws/v8a6y7y7/spreadb-public:latest

            docker stop backend || true
            docker rm backend || true

            docker run -d --name backend -p 3001:3001 \
              -e NODE_ENV=production \
              public.ecr.aws/v8a6y7y7/spreadb-public:latest

            echo "=== Frontend Deploy ==="

            sudo rm -rf /usr/share/nginx/html/*
            sudo cp -r /home/ec2-user/frontend-temp/* /usr/share/nginx/html/
            sudo systemctl restart nginx

            echo "Deployment Completed!"
